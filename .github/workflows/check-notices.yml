name: Check JNU Notices

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"

jobs:
  check-notices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run notice check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_STORAGE_TOKEN: ${{ github.token }}
          GITHUB_STORAGE_REPOSITORY: ${{ github.repository }}
          GITHUB_STORAGE_BRANCH: ${{ github.ref_name }}
        run: npm run check:notices

      - name: Commit stored notices update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stored-notices.json data/notice-updates.json data/hot-notices.json data/notice-check-snapshot.json data/my-alerts-snapshots.json
          git diff --cached --quiet || git commit -m "chore: update stored notices"
          git push
